[build]
  command = "npm install --include=dev && npm run build"
  publish = "dist/client"

[dev]
  command = "npm run dev"
  targetPort = 3000
  framework = "#custom"

# API redirects to Netlify Functions
[[redirects]]
  from = "/api/auth/*"
  to = "/.netlify/functions/auth"
  status = 200
  
[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[build.environment]
  NODE_VERSION = "20"
