[build]
  command = "npm install --include=dev && npm run build"
  publish = "dist/client"

# 1. API routes for your custom auth function
[[redirects]]
  from = "/api/auth/*"
  to = "/.netlify/functions/auth"
  status = 200

# 2. Catch-all for SSR pages (VibeKit frontend)
[[redirects]]
  from = "/*"
  to = "/.netlify/functions/server"
  status = 200
  